{% extends "base.html" %}

{% block title %}AI Assistant{% endblock %}

{% block content %}
<h1>AI Assistant</h1>
<p>Ask a question and get a response from OpenAI.</p>

<form method="POST">
  <div class="form-group">
    <label for="prompt">Your question</label>
    <textarea id="prompt" name="prompt" placeholder="Ask me anything...">{{ prompt or '' }}</textarea>
  </div>
  <button type="submit">Ask</button>
</form>

{% if answer %}
  <h2>Response</h2>
  <div class="ai-response">{{ answer }}</div>
{% endif %}
{% endblock %}
